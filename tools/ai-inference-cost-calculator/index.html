<body>
<div class="container">
  <header>
    <h1>AI Inference Cost Calculator</h1>
    <p class="subtitle">Compare costs across OpenAI, Anthropic, Google, and more</p>
  </header>

  <div class="input-section">
    <div class="input-row">
      <div class="input-group">
        <label>Input Tokens <span class="label-hint">(per request)</span></label>
        <input type="number" id="inputTokens" value="1000" min="1" max="10000000">
      </div>
      <div class="input-group">
        <label>Output Tokens <span class="label-hint">(per request)</span></label>
        <input type="number" id="outputTokens" value="500" min="1" max="10000000">
      </div>
    </div>

    <div class="input-row">
      <div class="input-group">
        <label>Requests per Month</label>
        <input type="number" id="requestsPerMonth" value="10000" min="1" max="100000000">
      </div>
      <div class="input-group">
        <label>Model Tier</label>
        <select id="modelTier">
          <option value="base" selected>Base Models</option>
          <option value="pro">Pro/Advanced</option>
          <option value="premium">Premium/Flagship</option>
        </select>
      </div>
    </div>

    <div class="button-group">
      <button class="btn-calculate" onclick="calculateCosts()">Calculate Costs</button>
      <button class="btn-reset" onclick="resetForm()">Reset</button>
    </div>
    <div class="error" id="error"></div>
  </div>

  <div class="results" id="results">
    <div class="results-grid" id="resultsGrid"></div>
    <div class="comparison-note">
      <div class="comparison-note-title">Cost Comparison Notes</div>
      <div class="comparison-note-text" id="comparisonText"></div>
    </div>
  </div>

  <div class="partner-box">
    <p>Recommended by our team</p>
    <a href="https://www.belikenative.com?ref=satellite" target="_blank" rel="noopener">BeLikeNative.com</a>
    <p>The #1 AI writing tool for freelancers — perfect grammar in any language, instantly.</p>
  </div>

  <div class="ad-unit">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2241192243363112" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <footer>
    <p>&copy; 2026 GPT0x. <a href="https://gpt0x.com/tools/">More AI Tools</a></p>
  </footer>
</div>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2241192243363112" crossorigin="anonymous"></script>

<script>
const pricingData = {
  base: {
    'OpenAI GPT-4': { input: 0.00003, output: 0.00006 },
    'OpenAI GPT-3.5': { input: 0.0000005, output: 0.0000015 },
    'Anthropic Claude 3 Haiku': { input: 0.00000025, output: 0.00000125 },
    'Google Gemini 1.5': { input: 0.000000075, output: 0.0000003 },
    'Mistral Medium': { input: 0.00000027, output: 0.00000081 }
  },
  pro: {
    'OpenAI GPT-4 Turbo': { input: 0.00001, output: 0.00003 },
    'Anthropic Claude 3 Sonnet': { input: 0.000003, output: 0.000015 },
    'Google Gemini Pro': { input: 0.0000005, output: 0.0000015 },
    'Mistral Large': { input: 0.0000081, output: 0.0000243 }
  },
  premium: {
    'OpenAI GPT-4 Vision': { input: 0.00003, output: 0.00006 },
    'Anthropic Claude 3 Opus': { input: 0.000015, output: 0.000075 },
    'Google Gemini Ultra': { input: 0.000002, output: 0.000006 }
  }
};

function calculateCosts() {
  const errorEl = document.getElementById('error');
  errorEl.classList.remove('show');

  const inputTokens = parseInt(document.getElementById('inputTokens').value);
  const outputTokens = parseInt(document.getElementById('outputTokens').value);
  const requestsPerMonth = parseInt(document.getElementById('requestsPerMonth').value);
  const modelTier = document.getElementById('modelTier').value;

  if (!inputTokens || !outputTokens || !requestsPerMonth) {
    errorEl.textContent = 'Please enter valid values for all fields.';
    errorEl.classList.add('show');
    return;
  }

  const models = pricingData[modelTier];
  const results = [];

  for (const [modelName, pricing] of Object.entries(models)) {
    const costPerRequest = (inputTokens * pricing.input) + (outputTokens * pricing.output);
    const monthlyCost = costPerRequest * requestsPerMonth;
    const annualCost = monthlyCost * 12;

    results.push({
      name: modelName,
      costPerRequest: costPerRequest,
      monthlyCost: monthlyCost,
      annualCost: annualCost
    });
  }

  results.sort((a, b) => a.monthlyCost - b.monthlyCost);

  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';

  results.forEach((result, index) => {
    const isCheapest = index === 0;
    const card = document.createElement('div');
    card.className = 'provider-card' + (isCheapest ? ' cheapest' : '');

    const savings = isCheapest ? '' : ` (Save $${(results[0].monthlyCost - result.monthlyCost).toFixed(2)}/mo vs ${results[0].name})`;

    card.innerHTML = `
      <div class="provider-name">
        ${result.name}
        ${isCheapest ? '<span class="badge">CHEAPEST</span>' : ''}
      </div>
      <div class="cost-item">
        <div class="cost-label">Cost per Request</div>
        <div class="cost-value">$${result.costPerRequest.toFixed(6)}</div>
      </div>
      <div class="monthly-estimate">
        <div class="monthly-estimate-label">Monthly Estimate</div>
        <div class="monthly-estimate-value">$${result.monthlyCost.toFixed(2)}</div>
      </div>
      <div class="cost-item" style="margin-top: 12px;">
        <div class="cost-label">Annual Cost</div>
        <div class="cost-value">$${result.annualCost.toFixed(2)}</div>
      </div>
    `;
    grid.appendChild(card);
  });

  const cheapest = results[0];
  const most_expensive = results[results.length - 1];
  const savings = most_expensive.monthlyCost - cheapest.monthlyCost;

  let comparisonText = `Using ${cheapest.name} would cost $${cheapest.monthlyCost.toFixed(2)}/month. `;
  comparisonText += `Switching from ${most_expensive.name} would save $${savings.toFixed(2)}/month or $${(savings * 12).toFixed(2)}/year. `;
  comparisonText += 'Pricing accurate as of June 2026. Consider rate limits, latency, and quality when choosing providers.';

  document.getElementById('comparisonText').textContent = comparisonText;
  document.getElementById('results').classList.add('show');
}

function resetForm() {
  document.getElementById('inputTokens').value = '1000';
  document.getElementById('outputTokens').value = '500';
  document.getElementById('requestsPerMonth').value = '10000';
  document.getElementById('modelTier').value = 'base';
  document.getElementById('results').classList.remove('show');
  document.getElementById('error').classList.remove('show');
}

document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') calculateCosts();
});
</script>

</body>
