<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Model Database — Compare 40+ AI Models | gpt0x.com</title>
  <meta name="description" content="Searchable database of 40+ AI models. Compare GPT-4, Claude, Gemini, Llama, Mistral, and more by parameters, context window, and capabilities.">
  <meta name="keywords" content="AI models comparison, LLM database, GPT-4 vs Claude, AI model specs, large language models">
  <link rel="canonical" href="https://gpt0x.com/">
  <meta property="og:title" content="AI Model Database | gpt0x.com">
  <meta property="og:description" content="Compare 40+ AI models. Filter by type, provider, open-source status.">
  <meta property="og:url" content="https://gpt0x.com/">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">gpt0x</a>
      <nav>
        <a href="/">Database</a>
        <a href="/blog/">Blog</a>
        <a href="/about.html">About</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>AI <span>Model</span> Database</h1>
      <p>Search and compare 40+ AI models. Filter by type, provider, parameters, and open-source status.</p>
    </section>

    <div class="filters">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="search-input" class="search-input" placeholder="Search models..." oninput="gpt0x.filter()">
      </div>
      <div class="filter-group">
        <label>Type</label>
        <select id="type-filter" onchange="gpt0x.filter()">
          <option value="">All Types</option>
          <option value="text">Text</option>
          <option value="image">Image</option>
          <option value="audio">Audio</option>
          <option value="multi">Multimodal</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Provider</label>
        <select id="provider-filter" onchange="gpt0x.filter()">
          <option value="">All Providers</option>
          <option value="OpenAI">OpenAI</option>
          <option value="Anthropic">Anthropic</option>
          <option value="Google">Google</option>
          <option value="Meta">Meta</option>
          <option value="Mistral">Mistral</option>
          <option value="Microsoft">Microsoft</option>
          <option value="Cohere">Cohere</option>
          <option value="Databricks">Databricks</option>
          <option value="TII">TII</option>
          <option value="01.AI">01.AI</option>
          <option value="Alibaba">Alibaba</option>
          <option value="DeepSeek">DeepSeek</option>
          <option value="Stability AI">Stability AI</option>
          <option value="Black Forest Labs">Black Forest Labs</option>
          <option value="Midjourney">Midjourney</option>
          <option value="Suno">Suno</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Open Source</label>
        <select id="open-filter" onchange="gpt0x.filter()">
          <option value="">All</option>
          <option value="yes">Open Source</option>
          <option value="no">Closed Source</option>
        </select>
      </div>
    </div>

    <div class="stats-bar">
      Showing <span id="result-count">0</span> models
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="name" onclick="gpt0x.sort('name')">Name <span class="sort-arrow"></span></th>
            <th data-col="provider" onclick="gpt0x.sort('provider')">Provider <span class="sort-arrow"></span></th>
            <th data-col="type" onclick="gpt0x.sort('type')">Type <span class="sort-arrow"></span></th>
            <th data-col="params" onclick="gpt0x.sort('params')">Parameters <span class="sort-arrow"></span></th>
            <th data-col="context" onclick="gpt0x.sort('context')">Context <span class="sort-arrow"></span></th>
            <th data-col="release" onclick="gpt0x.sort('release')">Release <span class="sort-arrow"></span></th>
            <th data-col="open" onclick="gpt0x.sort('open')">Open Source <span class="sort-arrow"></span></th>
            <th data-col="api" onclick="gpt0x.sort('api')">API <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="model-tbody"></tbody>
      </table>
    </div>
  </main>

  <div id="detail-overlay" class="detail-overlay">
    <div id="detail-card" class="detail-card">
      <button class="close-btn" onclick="gpt0x.closeDetail()">&times;</button>
      <h2></h2>
      <div class="detail-grid"></div>
    </div>
  </div>

  <footer>
    <p>GPT0X &mdash; AI model directory</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
